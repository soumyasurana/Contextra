[server]
host = "127.0.0.1"
port = 8080
workers = 4
env = "development"
log_level = "info"

[database]
url = "postgres://postgres:postgres@localhost:5432/Contextra"
max_connections = 10

[redis]
url = "redis://localhost:6379"

[vector_store]
url = "http://localhost:6333"

[providers]
provider = "openai"
# openai_api_key = "sk-..."
# anthropic_api_key = "sk-ant-..."
# gemini_api_key = "..."

[telemetry]
enabled = false
